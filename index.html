<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oUMA-san</title>
    <!-- React, ReactDOM, Babel (JSXの変換用) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Lucideアイコンのサイズ調整用 */
        .lucide { width: 24px; height: 24px; vertical-align: middle; }
        
        /* 目が光るアニメーション */
        @keyframes eye-glow {
            0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 2px #fff); }
            50% { opacity: 1; filter: drop-shadow(0 0 5px #ff0); }
        }
        .animate-eye-glow {
            animation: eye-glow 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Lucideアイコンのスタブコンポーネント
        const RefreshCw = () => <i data-lucide="refresh-cw"></i>;
        const CheckCircle2 = ({ size }) => <i data-lucide="check-circle-2" style={{width: size, height: size}}></i>;
        const Play = ({ size }) => <i data-lucide="play" style={{width: size, height: size}}></i>;

        const { useState, useEffect, useMemo } = React;

        // --- 定数定義 ---
        const ANIMAL_DATA = {
            ONEZUMI: { name: 'ONEZUMI', p1: 'B', p2: 'Y', emoji: '🖱️' },
            OUSHI: { name: 'OUSHI', p1: 'D', p2: 'W', emoji: '🐂' },
            OTORA: { name: 'OTORA', p1: 'F', p2: 'U', emoji: '🐅' },
            OUSAGI: { name: 'OUSAGI', p1: 'H', p2: 'S', emoji: '🐇' },
            OTATSU: { name: 'OTATSU', p1: 'J', p2: 'Q', emoji: '🐉' },
            OHEBI: { name: 'OHEBI', p1: 'L', p2: 'O', emoji: '🐍' },
            OUMA: { name: 'OUMA', p1: 'N', p2: 'M', emoji: '🐎' },
            OHITSUJI: { name: 'OHITSUJI', p1: 'P', p2: 'K', emoji: '🐏' },
            OSARU: { name: 'OSARU', p1: 'R', p2: 'I', emoji: '🐒' },
            OTORI: { name: 'OTORI', p1: 'T', p2: 'G', emoji: '🐓' },
            OINU: { name: 'OINU', p1: 'V', p2: 'E', emoji: '🐕' },
            OINOSHISHI: { name: 'OINOSHISHI', p1: 'X', p2: 'C', emoji: '🐗' },
            OTANUKI: { name: 'OTANUKI', p1: 'Z', p2: 'A', emoji: '🍃' },
        };

        const CHAR_TO_ANIMAL = (() => {
            const map = {};
            Object.values(ANIMAL_DATA).forEach(data => {
                map[data.p1] = { ...data, pattern: 1 };
                map[data.p2] = { ...data, pattern: 2 };
            });
            return map;
        })();

        const INITIAL_NAME = "TOPPA";

        const App = () => {
            const [screen, setScreen] = useState('title');
            const [currentName, setCurrentName] = useState(INITIAL_NAME);
            const [displayImage, setDisplayImage] = useState(null);
            const [displayName, setDisplayName] = useState(INITIAL_NAME);
            const [selectedIndices, setSelectedIndices] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [animalLayouts, setAnimalLayouts] = useState([]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            // 現在の名前から出現する動物のリストを生成
            const appearingAnimals = useMemo(() => {
                if (!currentName) return [];
                return currentName.split('').map(char => CHAR_TO_ANIMAL[char.toUpperCase()]).filter(Boolean);
            }, [currentName]);

            // 動物のランダムな配置を計算（左から右への順序を維持）
            useEffect(() => {
                const count = appearingAnimals.length;
                if (count > 0) {
                    const segmentWidth = 90 / count; // 画面幅を分割
                    const layouts = appearingAnimals.map((_, i) => {
                        const minLeft = 5 + (i * segmentWidth);
                        const randomLeft = minLeft + Math.random() * (segmentWidth * 0.8); // 区画内で余裕を持たせて配置
                        return {
                            top: (Math.random() * 50 + 20).toFixed(2) + "%", // 20% to 70%
                            left: randomLeft.toFixed(2) + "%",
                            scale: (Math.random() * 0.5 + 0.75).toFixed(2), // 0.75 to 1.25
                        };
                    });
                    setAnimalLayouts(layouts);
                } else {
                    setAnimalLayouts([]);
                }
            }, [appearingAnimals]);

            const resetGame = () => {
                setCurrentName(INITIAL_NAME);
                setDisplayName(INITIAL_NAME);
                setDisplayImage(null);
                setSelectedIndices([]);
                setIsProcessing(false);
            };

            const handleStart = () => {
                resetGame();
                setScreen('game');
            };

            const toggleSelect = (index) => {
                if (isProcessing) return;
                setSelectedIndices(prev => {
                    if (prev.includes(index)) return prev.filter(i => i !== index);
                    if (prev.length >= 4) return prev;
                    return [...prev, index];
                });
            };

            const handleCapture = () => {
                if (selectedIndices.length === 0 || isProcessing) return;
                
                const selectedAnimals = selectedIndices.map(i => appearingAnimals[i]);

                // クリア判定
                if (selectedAnimals.length === 1 && selectedAnimals[0].name === 'OUMA' && selectedAnimals[0].pattern === 1) {
                    setScreen('clear');
                    return;
                }

                let nextName = "";
                let nextDisplay = null;

                if (selectedAnimals.length === 1) {
                    const animal = selectedAnimals[0];
                    if (animal.pattern === 2) {
                        nextName = "";
                        nextDisplay = { type: 'escape', text: '逃げられた！' };
                    } else {
                        nextName = animal.name;
                        nextDisplay = { animals: [animal], composite: false };
                    }
                } else {
                    const species = selectedAnimals.map(a => a.name);
                    const hasDuplicate = new Set(species).size !== species.length;

                    if (hasDuplicate) {
                        nextName = "";
                        nextDisplay = { type: 'escape', text: '仲間割れして逃げられた！' };
                    } else {
                        const specialOrder = ['OSARU', 'OTANUKI', 'OTORA', 'OHEBI'];
                        const isSpecial = selectedAnimals.length === 4 && 
                                          selectedAnimals.every((a, idx) => a.name === specialOrder[idx]);
                        
                        nextName = isSpecial ? "ONUE" : "UMA";
                        nextDisplay = { animals: selectedAnimals, composite: true, count: selectedAnimals.length };
                    }
                }

                setDisplayName(nextDisplay.type === 'escape' ? "" : nextName);
                setDisplayImage(nextDisplay);
                setCurrentName(nextName);
                setSelectedIndices([]);
            };

            const AnimalImage = ({ animal, className = "", style = {} }) => {
                if (!animal) return null;
                const src = `images/${animal.name}_${animal.pattern}.PNG`;
                return (
                    <div className={`relative overflow-hidden bg-gray-100 flex items-center justify-center ${className}`} style={style}>
                        <img 
                            src={src} 
                            alt={animal.name} 
                            className="w-full h-full object-contain pointer-events-none"
                            draggable="false"
                            onError={(e) => {
                                e.target.style.display = 'none';
                                e.target.nextSibling.style.display = 'flex';
                            }}
                        />
                        <div className="hidden absolute inset-0 flex items-center justify-center text-4xl bg-white select-none">
                            {animal.emoji}
                        </div>
                    </div>
                );
            };

            const CompositeView = ({ data }) => {
                if (!data || data.type === 'escape') {
                    return (
                        <div className="w-full h-full flex flex-col items-center justify-center bg-gray-200 text-gray-500 rounded-lg">
                            {data?.type === 'escape' ? (
                                <span className="text-xl font-bold text-red-500">{data.text}</span>
                            ) : (
                                <span className="text-sm">捕獲エリア</span>
                            )}
                        </div>
                    );
                }

                const { animals, composite, count } = data;
                if (!composite) {
                    return <AnimalImage animal={animals[0]} className="w-full h-full rounded-lg border-2 border-indigo-500 shadow-lg" />;
                }

                return (
                    <div className="w-full h-full relative rounded-lg border-2 border-indigo-500 shadow-lg overflow-hidden flex">
                        {count === 2 && (
                            <React.Fragment>
                                <div className="w-1/2 h-full overflow-hidden border-r border-white">
                                    <AnimalImage animal={animals[0]} className="w-[200%] h-full max-w-none" />
                                </div>
                                <div className="w-1/2 h-full overflow-hidden">
                                    <AnimalImage animal={animals[1]} className="w-[200%] h-full max-w-none" style={{ transform: 'translateX(-50%)' }} />
                                </div>
                            </React.Fragment>
                        )}
                        {count === 3 && (
                            <React.Fragment>
                                <div className="w-1/3 h-full overflow-hidden border-r border-white">
                                    <AnimalImage animal={animals[0]} className="w-[300%] h-full max-w-none" />
                                </div>
                                <div className="w-2/3 h-full flex flex-col">
                                    <div className="h-1/2 w-full overflow-hidden border-b border-white">
                                        <AnimalImage animal={animals[1]} className="w-[150%] h-[200%] max-w-none" style={{ transform: 'translate(-33.33%, 0)' }} />
                                    </div>
                                    <div className="h-1/2 w-full overflow-hidden">
                                        <AnimalImage animal={animals[2]} className="w-[150%] h-[200%] max-w-none" style={{ transform: 'translate(-33.33%, -50%)' }} />
                                    </div>
                                </div>
                            </React.Fragment>
                        )}
                        {count === 4 && (
                            <React.Fragment>
                                {/* 1番目: 左1/3 */}
                                <div className="w-[33.33%] h-full overflow-hidden border-r border-white">
                                    <AnimalImage animal={animals[0]} className="w-[300%] h-full max-w-none" />
                                </div>
                                {/* 2・3番目: 中央1/3の上下 */}
                                <div className="w-[33.33%] h-full flex flex-col border-r border-white">
                                    <div className="h-1/2 w-full overflow-hidden border-b border-white">
                                        <AnimalImage animal={animals[1]} className="w-[300%] h-[200%] max-w-none" style={{ transform: 'translate(-33.33%, 0)' }} />
                                    </div>
                                    <div className="h-1/2 w-full overflow-hidden">
                                        <AnimalImage animal={animals[2]} className="w-[300%] h-[200%] max-w-none" style={{ transform: 'translate(-33.33%, -50%)' }} />
                                    </div>
                                </div>
                                {/* 4番目: 右1/3 */}
                                <div className="w-[33.33%] h-full overflow-hidden">
                                    <AnimalImage animal={animals[3]} className="w-[300%] h-full max-w-none" style={{ transform: 'translateX(-66.66%)' }} />
                                </div>
                            </React.Fragment>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans text-slate-800">
                    <div className="max-w-2xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                        {screen === 'title' && (
                            <div className="flex flex-col items-center justify-center py-20 px-8 text-center">
                                <h1 className="text-6xl font-black text-indigo-600 mb-8 tracking-tighter">oUMA-san</h1>
                                <button onClick={handleStart} className="px-12 py-4 bg-indigo-600 text-white font-bold rounded-full hover:bg-indigo-700 transition-all shadow-lg flex items-center gap-2 text-xl">
                                    <Play size={24} /> START
                                </button>
                                <p className="mt-8 text-slate-500 font-medium">お馬さんを捕獲せよ</p>
                            </div>
                        )}
                        {screen === 'game' && (
                            <div className="p-6 flex flex-col gap-6">
                                <div className="flex justify-between items-center mb-2">
                                    <h2 className="text-2xl font-black text-slate-400">GAME</h2>
                                    <button onClick={resetGame} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg flex items-center gap-1 text-sm font-bold">
                                        <RefreshCw /> RESET
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="aspect-square bg-slate-100 rounded-2xl overflow-hidden flex items-center justify-center p-2 border-4 border-slate-100">
                                        <CompositeView data={displayImage} />
                                    </div>
                                    <div className="flex flex-col justify-center items-center bg-indigo-50 rounded-2xl p-8 border-4 border-indigo-100 min-h-[160px]">
                                        <span className="text-xs uppercase tracking-widest text-indigo-400 font-bold mb-2">Current Identity</span>
                                        <span className="text-4xl font-black text-indigo-900 tracking-widest break-all text-center h-12 flex items-center">{displayName}</span>
                                        {displayName === "UMA" && (
                                            <div className="text-red-600 text-sm font-bold mt-2 animate-pulse">
                                                こ、これは未確認生物だ！
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest">Shadow Area (Select Eyes)</label>
                                    <div className="relative w-full h-[240px] bg-black rounded-2xl overflow-hidden border-4 border-slate-900 cursor-crosshair">
                                        {appearingAnimals.map((animal, idx) => {
                                            const layout = animalLayouts[idx] || { top: '50%', left: '50%', scale: '1' };
                                            const isSelected = selectedIndices.includes(idx);
                                            return (
                                                <button
                                                    key={`${currentName}-${idx}`}
                                                    onClick={() => toggleSelect(idx)}
                                                    disabled={isProcessing}
                                                    style={{ 
                                                        position: 'absolute',
                                                        top: layout.top,
                                                        left: layout.left,
                                                        transform: `translate(-50%, -50%) scale(${layout.scale})`,
                                                        zIndex: isSelected ? 10 : 1
                                                    }}
                                                    className={`group transition-all duration-300 p-4 rounded-full ${isSelected ? 'ring-2 ring-indigo-500' : ''}`}
                                                >
                                                    {/* 光る目 */}
                                                    <div className="flex gap-4 items-center justify-center">
                                                        <div className={`w-1.5 h-1.5 bg-yellow-100 rounded-full animate-eye-glow ${isSelected ? 'bg-indigo-400' : ''}`}></div>
                                                        <div className={`w-1.5 h-1.5 bg-yellow-100 rounded-full animate-eye-glow ${isSelected ? 'bg-indigo-400' : ''}`}></div>
                                                    </div>
                                                    {/* 選択順序の表示 */}
                                                    {isSelected && (
                                                        <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-indigo-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-bold">
                                                            {selectedIndices.indexOf(idx) + 1}
                                                        </div>
                                                    )}
                                                </button>
                                            );
                                        })}
                                        {appearingAnimals.length === 0 && (
                                            <div className="absolute inset-0 flex items-center justify-center text-slate-600 font-bold text-sm select-none">
                                                ここには動物がいないようです...
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <button onClick={handleCapture} disabled={selectedIndices.length === 0 || isProcessing} className={`w-full py-4 rounded-2xl font-black text-xl shadow-lg transition-transform active:scale-95 ${selectedIndices.length > 0 && !isProcessing ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-400'}`}>
                                    CAPTURE ({selectedIndices.length})
                                </button>
                            </div>
                        )}
                        {screen === 'clear' && (
                            <div className="flex flex-col items-center justify-center py-20 px-8 text-center animate-in zoom-in duration-500">
                                <div className="w-48 h-48 mb-6 border-4 border-yellow-400 rounded-2xl overflow-hidden shadow-2xl bg-white">
                                    <AnimalImage animal={{...ANIMAL_DATA.OUMA, pattern: 1}} className="w-full h-full" />
                                </div>
                                <h1 className="text-5xl font-black text-indigo-900 mb-8 tracking-tighter">お馬さん捕獲！</h1>
                                <button onClick={() => setScreen('title')} className="px-10 py-4 bg-slate-800 text-white font-bold rounded-full flex items-center gap-2 hover:bg-slate-900 transition-colors">
                                    <RefreshCw /> BACK TO TITLE
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
